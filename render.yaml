services:
  - type: web
    name: houseplant-rag
    runtime: python
    buildCommand: pip install --prefer-binary -r requirements.txt
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: CARGO_HOME
        value: /tmp/cargo